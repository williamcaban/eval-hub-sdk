name: Tests

on:
  push:
  pull_request:

env:
  MIN_PY_VER: "3.12"  # using same as in pyproject.toml

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --all-extras
    - name: Run tests with coverage
      run: |
        uv run pytest --cov=src/evalhub --cov-report=term-missing --cov-report=xml

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Set up Python
      run: uv python install ${{ env.MIN_PY_VER }}
    - name: Install dependencies
      run: uv sync --all-extras
    - name: Run ruff linting
      run: uv run ruff check src/ tests/
    - name: Run ruff formatting check
      run: uv run ruff format --check src/ tests/
    - name: Run mypy type checking
      run: uv run mypy src/evalhub

  e2e:
    name: "Optional: E2E Tests"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up uv
      uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
    - name: Set up Python
      run: uv python install ${{ env.MIN_PY_VER }}
    - name: Install dependencies
      run: uv sync --all-extras
    - name: Create kind cluster
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
    - name: Deploy distribution registry
      run: ./scripts/deploy_distribution_registry.sh
    - name: Run E2E tests
      run: |
        make test-e2e
